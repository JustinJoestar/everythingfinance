# Free scheduler for the ingestion pipeline. Vercel's free plan only allows
# once-daily crons, so GitHub Actions triggers our endpoints instead:
#   - every 30m: news ingestion (+ AI summaries)
#   - daily:   "Today's recap" (~6:30 AM ET)
#   - weekly:  flashcards + quiz (Mondays)
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   APP_URL      e.g. https://everythingfinance.vercel.app  (no trailing slash)
#   CRON_SECRET  the same value as the CRON_SECRET env var on Vercel

name: Scheduled jobs

on:
  schedule:
    - cron: "0,30 * * * *"  # ingestion every 30 min, on the hour and half hour
    - cron: "35 10 * * *"  # daily recap — 10:35 UTC ≈ 6:35 AM ET
    - cron: "50 10 * * 1"  # weekly flashcards + quiz — Mondays
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run manually"
        type: choice
        options: [ingest, recap, weekly, seed]
        default: ingest

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Decide which endpoint to call
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.job }}" in
              seed) echo "path=/api/admin/seed" >> "$GITHUB_OUTPUT" ;;
              recap) echo "path=/api/cron/recap" >> "$GITHUB_OUTPUT" ;;
              weekly) echo "path=/api/cron/weekly" >> "$GITHUB_OUTPUT" ;;
              *) echo "path=/api/cron/ingest" >> "$GITHUB_OUTPUT" ;;
            esac
          elif [ "${{ github.event.schedule }}" = "35 10 * * *" ]; then
            echo "path=/api/cron/recap" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "50 10 * * 1" ]; then
            echo "path=/api/cron/weekly" >> "$GITHUB_OUTPUT"
          else
            echo "path=/api/cron/ingest" >> "$GITHUB_OUTPUT"
          fi

      - name: Call the endpoint
        run: |
          RESP=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 320 \
            "${{ secrets.APP_URL }}${{ steps.pick.outputs.path }}")
          echo "$RESP"
          # After an ingest, refresh the recap. When the run brought in new
          # articles (a real Gemini update), regenerate it (force=1) so the
          # recap tracks the latest news; otherwise just make sure today's
          # exists (the endpoint self-skips). Never fails the job.
          if [ "${{ steps.pick.outputs.path }}" = "/api/cron/ingest" ]; then
            NEW=$(printf '%s' "$RESP" | grep -oE '"newArticles":[0-9]+' | grep -oE '[0-9]+' | head -1)
            if [ "${NEW:-0}" -gt 0 ]; then
              RECAP_URL="${{ secrets.APP_URL }}/api/cron/recap?force=1"
            else
              RECAP_URL="${{ secrets.APP_URL }}/api/cron/recap"
            fi
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              --max-time 120 \
              "$RECAP_URL" || true
          fi
